name: CI — MedGuard

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint + Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Lint com Ruff
        run: ruff check .

      - name: 🗄️ Aplicar migrações
        run: python manage.py migrate --settings=config.settings

      - name: 🧪 Executar testes com cobertura
        run: pytest tests/ -v --cov=medicamento --cov-report=term-missing

      - name: ✅ Verificar versão
        run: grep '^version' pyproject.toml
