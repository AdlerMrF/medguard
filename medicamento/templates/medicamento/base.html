<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💊 MedGuard — {% block title %}Início{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; color: #2d3748; }
    header { background: linear-gradient(135deg, #2b6cb0, #2c5282); color: white; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    header h1 { font-size: 1.5rem; }
    nav a { color: #bee3f8; text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; transition: color 0.2s; }
    nav a:hover { color: white; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.8rem; font-weight: bold; }
    .badge-alto    { background: #fed7d7; color: #c53030; }
    .badge-medio   { background: #fefcbf; color: #b7791f; }
    .badge-baixo   { background: #c6f6d5; color: #276749; }
    .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 8px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; font-size: 0.9rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: #3182ce; color: white; }
    .btn-danger    { background: #e53e3e; color: white; }
    .btn-success   { background: #38a169; color: white; }
    .btn-warning   { background: #d69e2e; color: white; }
    .btn-secondary { background: #718096; color: white; }
    .messages { list-style: none; margin-bottom: 1rem; }
    .messages li { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; font-weight: 500; }
    .messages .success { background: #c6f6d5; color: #276749; }
    .messages .error   { background: #fed7d7; color: #c53030; }
    .messages .info    { background: #bee3f8; color: #2b6cb0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #edf2f7; font-weight: 600; color: #4a5568; }
    tr:hover { background: #f7fafc; }
    form .field { margin-bottom: 1.2rem; }
    form label  { display: block; font-weight: 600; margin-bottom: 0.3rem; }
    form input, form select, form textarea { width: 100%; padding: 0.6rem 0.9rem; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; }
    form input:focus, form select:focus, form textarea:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
    .help-text { font-size: 0.82rem; color: #718096; margin-top: 0.2rem; }
    .errorlist { color: #c53030; font-size: 0.85rem; padding-left: 1rem; }
    footer { text-align: center; color: #a0aec0; font-size: 0.82rem; padding: 2rem; }
  </style>
</head>
<body>

<header>
  <h1>💊 MedGuard</h1>
  <nav>
    <a href="{% url 'medicamento:index' %}">🏠 Início</a>
    <a href="{% url 'medicamento:listar' %}">📋 Medicamentos</a>
    <a href="{% url 'medicamento:cadastrar' %}">➕ Cadastrar</a>
    <a href="{% url 'medicamento:alertas' %}">⏰ Alertas</a>
  </nav>
</header>

<main>
  {% if messages %}
    <ul class="messages">
      {% for msg in messages %}
        <li class="{{ msg.tags }}">{{ msg }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  {% block content %}{% endblock %}
</main>

<footer>
  MedGuardian v1.0.0 — Controle de medicamentos para idosos
</footer>

</body>
</html>
